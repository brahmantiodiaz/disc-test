<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon standard -->
    <link rel="icon" href="./asset/favicon.ico" />

    <!-- PNG favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./asset/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./asset/favicon-16x16.png"
    />

    <!-- Android Chrome -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="./asset/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="./asset/android-chrome-512x512.png"
    />

    <!-- Apple (iPhone/iPad) -->
    <link rel="apple-touch-icon" href="./asset/apple-touch-icon.png" />

    <title>Login - DISC Assessment App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <main class="py-4 py-md-5">
      <div class="container">
        <div id="page-content">
          <div class="row justify-content-center">
            <div class="col-lg-6">
              <div class="app-card p-4 p-md-5 admin-card">
                <h1 class="h3 mb-3">User Login</h1>

                <form id="user-login-form">
                  <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input
                      id="username"
                      class="form-control"
                      placeholder="Masukkan username"
                      autocomplete="username"
                    />
                  </div>

                  <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input
                      id="password"
                      type="password"
                      class="form-control"
                      placeholder="Masukkan password"
                      autocomplete="current-password"
                    />
                  </div>
                  <span>
                    <p>
                      Don't have an account?
                      <a class="link-opacity-100-hover" href="/register.html"
                        >Sign up</a
                      >
                    </p></span
                  >
                  <div class="d-flex flex-wrap gap-3">
                    <a href="index.html" class="btn btn-outline-secondary"
                      >Kembali</a
                    >
                    <button type="submit" class="btn btn-primary">Login</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>

    <script src="./js/core/init.js" defer></script>
    <script src="./js/core/permission.js" defer></script>
    <script src="./js/services/alertServices.js" defer></script>
    <script src="./js/services/userServices.js" defer></script>
    <script src="./js/services/localStorageServices.js" defer></script>
    <script src="./js/components/navbar.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
    <script src="./js/pages/user-login.js" defer></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
